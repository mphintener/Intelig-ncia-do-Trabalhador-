name: Bot_Inteligencia

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run_scraper:
    runs-on: ubuntu-latest
    # ESTA SEÇÃO ABAIXO É A CHAVE PARA O ERRO 403
    permissions:
      contents: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Rodar Scraper
        run: python scripts/scraper.py

      - name: Salvar Dados
        run: |
          git config --global user.name 'Bot Inteligência'
          git config --global user.email 'bot@it.com'
          git add data/inteligencia.json
          git commit -m "Update: Dados de Expropriação SP" || echo "Sem mudanças"
          git push
